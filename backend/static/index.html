<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Draw</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <h1>Voice Draw</h1>
          <p id="statusText">初始化语音引擎</p>
        </div>
        <div class="signal-card" aria-live="polite">
          <div class="waveform" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="signal">
            <span id="listenDot" class="dot"></span>
            <span id="signalText">准备中</span>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="canvas-stage" aria-label="绘图画布">
          <canvas id="drawingCanvas"></canvas>
        </section>
        <aside class="activity-panel" aria-live="polite">
          <div class="metric-row">
            <span>对象</span>
            <strong id="objectCount">0</strong>
          </div>
          <div class="metric-row">
            <span>选中</span>
            <strong id="selectionCount">0</strong>
          </div>
          <div class="transcript-box">
            <span>输入</span>
            <p id="transcriptText">等待输入</p>
          </div>
          <form id="testCommandForm" class="test-command-form">
            <label for="testCommandInput">文字测试</label>
            <div class="test-command-row">
              <input
                id="testCommandInput"
                type="text"
                autocomplete="off"
                placeholder="画一个红色圆"
              />
              <button type="submit">执行</button>
            </div>
          </form>
          <ol id="activityLog" class="activity-log"></ol>
        </aside>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
